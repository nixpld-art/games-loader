<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>Loading...</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🎮</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
#gameFrame{width:100%;height:100%;border:none;display:block}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;z-index:10;transition:opacity 0.3s}
#loading.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="loading">
  <div class="spinner"></div>
  <span id="loadTitle">Loading game...</span>
</div>
<iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allow="autoplay; fullscreen"></iframe>
<script>
(function(){
  var frame = document.getElementById('gameFrame');
  var loading = document.getElementById('loading');
  var loadTitle = document.getElementById('loadTitle');
  var hash = window.location.hash.replace(/^#/, '');
  if(hash){
    var decoded = decodeURIComponent(hash);
    loadTitle.textContent = 'Launching...';
    frame.src = decoded;
  }
  frame.addEventListener('load', function(){
    loading.classList.add('hidden');
  });
  setTimeout(function(){ loading.classList.add('hidden'); }, 5000);
})();
</script>
</body>
</html>
