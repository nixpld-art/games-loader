<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>1v1.LOL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,iframe{width:100%;height:100%;border:none;display:block;background:#0a0a1a}
#load{position:fixed;inset:0;background:#0a0a1a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;z-index:10;font-family:'Segoe UI',sans-serif;color:#eee}
#load .sp{width:36px;height:36px;border:3px solid #1a1a3a;border-top-color:#00f0ff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load p{color:#555;font-size:13px}
</style>
</head>
<body>
<div id="load"><div class="sp"></div><p>Loading 1v1.LOL...</p></div>
<iframe id="f" style="display:none" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-pointer-lock allow-orientation-lock allow-presentation" allow="autoplay; fullscreen; web-share; accelerometer; gyroscope"></iframe>
<script>
var f = document.getElementById('f');
var load = document.getElementById('load');
// Serve through our proxy to avoid school blocks
var url = '/api/raw?url=' + encodeURIComponent('https://1v1.lol');
f.onload = function(){ load.style.display='none'; f.style.display='block'; };
f.onerror = function(){ load.innerHTML = '<p style="color:#ef4444">Failed to load. Check your connection.</p>'; };
f.src = url;
// Save session state
window.addEventListener('message', function(e){
  try { localStorage.setItem('gv_1v1lol_state', JSON.stringify(e.data)); } catch(ex){}
});
</script>
</body>
</html>
