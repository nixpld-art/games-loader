<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Stickman Hook</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Segoe UI',sans-serif}
#load{position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:10;color:#eee;text-align:center;padding:24px;transition:opacity 0.5s}
#load h2{font-size:24px;font-weight:900;background:linear-gradient(135deg,#00b894,#00cec9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
#load .sp{width:40px;height:40px;border:3px solid rgba(0,184,148,0.2);border-top-color:#00b894;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load p{color:#555;font-size:12px;max-width:300px;line-height:1.6}
#load .bar{width:200px;height:3px;background:#111;border-radius:2px;overflow:hidden}
#load .bar-fill{height:100%;background:linear-gradient(90deg,#00b894,#00cec9);width:0%;transition:width 0.3s;border-radius:2px}
#game-canvas-wrap{width:100%;height:100%;display:block}
</style>
</head>
<body>
<div id="load">
  <div class="sp"></div>
  <h2>Stickman Hook</h2>
  <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
  <p>Loading game bundle...</p>
</div>
<div id="game-canvas-wrap"></div>
<script>
// Track progress
var bar = document.getElementById('bar-fill');
var pct = 0;
var prog = setInterval(function(){ pct = Math.min(pct+2, 90); bar.style.width=pct+'%'; }, 80);

// Load progress from localStorage
try {
  var saved = localStorage.getItem('gv_progress_stickman_hook');
  if(saved) console.log('Saved progress found:', saved);
} catch(e) {}

// Load the actual bundle
var s = document.createElement('script');
s.src = 'bundle.js';
s.onload = function(){
  clearInterval(prog);
  bar.style.width='100%';
  setTimeout(function(){
    document.getElementById('load').style.opacity='0';
    setTimeout(function(){ document.getElementById('load').style.display='none'; },500);
  },300);
};
s.onerror = function(){
  clearInterval(prog);
  document.getElementById('load').innerHTML='<p style="color:#ef4444;font-size:13px">Failed to load game bundle.<br>Try refreshing.</p>';
};
document.head.appendChild(s);

// Save progress on leave
window.addEventListener('beforeunload', function(){
  try { localStorage.setItem('gv_progress_stickman_hook', JSON.stringify({t:Date.now(),page:'stickman-hook'})); } catch(e){}
});
</script>
</body>
</html>
